<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse Code Kids</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Page 0: Welcome/Splash -->
    <div id="page-welcome" class="page active">
        <div class="welcome-container">
            <div class="welcome-content">
                <div class="welcome-icon">😸</div>
                <h1>Morse Code Kids</h1>
                <p>เรียนรหัสมอร์สแบบสนุกๆ</p>
                <button class="btn btn-primary" onclick="goToPage('login')">🚀 Let's Start</button>
            </div>
        </div>
    </div>

    <!-- Page 1: Login -->
    <div id="page-login" class="page">
        <div class="header-bar">
            <button class="btn-back" onclick="goToPage('welcome')">← Back</button>
            <h2>เข้าสู่ระบบ</h2>
            <div></div>
        </div>
        <div class="login-container">
            <div class="login-icon">😸</div>
            <h2>Morse Code Kids</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">📧 ชื่อผู้ใช้</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">🔑 รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="button" class="btn btn-primary" onclick="handleLogin()">🔓 เข้าสู่ระบบ</button>
            </form>
            <button class="btn btn-secondary" onclick="handleGuestLogin()">❓ Guest (ไม่จดจำ)</button>
        </div>
    </div>

    <!-- Page 2: Home/Dashboard -->
    <div id="page-home" class="page">
        <div class="header-bar">
            <div></div>
            <h2>😸 Morse Code Kids</h2>
            <button class="btn-logout" onclick="handleLogout()">🚪 Out</button>
        </div>
        <div class="home-container">
            <div class="welcome-text">
                <p>เรียนรหัสมอร์สแบบสนุกๆ</p>
            </div>
            <div class="button-grid">
                <button class="btn btn-primary" onclick="goToPage('learn')">📚 เรียน</button>
                <button class="btn btn-secondary" onclick="goToPage('practice')">🎯 คิดค่า</button>
            </div>
        </div>
    </div>

    <!-- Page 3: Learn - Select Chapter -->
    <div id="page-learn" class="page">
        <div class="header-bar">
            <button class="btn-back" onclick="goToPage('home')">← Back</button>
            <h2>📚 เรียน</h2>
            <div></div>
        </div>
        <div class="learn-container">
            <div id="chapters-list"></div>
        </div>
    </div>

    <!-- Page 4: Test -->
    <div id="page-test" class="page">
        <div class="header-bar">
            <button class="btn-back" onclick="goToPage('learn')">← Back</button>
            <h2 id="test-chapter"></h2>
            <div></div>
        </div>
        <div class="test-container">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div id="progress-text" class="progress-text"></div>
            <div class="test-card">
                <div class="test-content">
                    <div class="morse-display">
                        <p>? มอร์สนี้คือตัวอักษรอะไร</p>
                        <div id="test-morse"></div>
                    </div>
                    <div class="options-grid" id="test-options"></div>
                </div>
            </div>
            <button class="btn btn-primary" id="test-submit" onclick="submitTestAnswer()">✅ ตรวจสอบ</button>
        </div>
    </div>

    <!-- Page 5: Results -->
    <div id="page-results" class="page">
        <div class="results-container">
            <div class="results-content">
                <h2>🎉 คะแนนของคุณ</h2>
                <div class="score-display">
                    <div id="score-text"></div>
                    <div id="stars"></div>
                </div>
                <div class="results-stats">
                    <div class="stat">
                        <span>✅ ถูกต้อง:</span>
                        <span id="correct-count">0</span>
                    </div>
                    <div class="stat">
                        <span>❌ ผิด:</span>
                        <span id="wrong-count">0</span>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="goToNextChapter()">📚 บท ถัดไป</button>
                    <button class="btn btn-secondary" onclick="retakeTest()">🔁 ทำใหม่</button>
                    <button class="btn btn-outline" onclick="goToPage('learn')">← กลับ Learn</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Page 6: Practice -->
    <div id="page-practice" class="page">
        <div class="header-bar">
            <button class="btn-back" onclick="goToPage('home')">← Back</button>
            <h2>🎯 คิดค่า</h2>
            <div></div>
        </div>
        <div class="practice-container">
            <p>เลือกแบบฝึก:</p>
            <div class="practice-options">
                <button class="practice-card" onclick="startPracticeMode('listen')">
                    <div class="practice-icon">🔊</div>
                    <h3>ฟังแล้วบอก</h3>
                    <p>เสียง → ตัวอักษร</p>
                </button>
                <button class="practice-card" onclick="startPracticeMode('speak')">
                    <div class="practice-icon">📝</div>
                    <h3>บอกแล้วสะกด</h3>
                    <p>ตัวอักษร → เสียง</p>
                </button>
            </div>
        </div>
    </div>

    <script src="morseData.js"></script>
    <script src="script.js"></script>
</body>
</html>
